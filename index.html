<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>数え棒アプリ</title>
<style>
:root{
  --ink:#263147;--line:#ffe08a;--soft:#fff8df;--shadow:#00000022;
  --yellow:#fff0a6;--green:#ddf7e6;--blue:#e4f2ff;--purple:#eeeaff;--pink:#ffe9f2;--red:#ffdede;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--ink);overflow:hidden;background:linear-gradient(180deg,#fff9df,#f3fbff);}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.app{width:100%;height:100dvh;display:grid;grid-template-rows:auto 1fr;background:linear-gradient(180deg,#fff9df,#f3fbff);}
header{background:#fff;border-bottom:4px solid var(--line);box-shadow:0 3px 12px #00000012;padding:8px 12px 7px;}
.topRow{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;margin-bottom:8px;}
h1{font-size:clamp(27px,3.2vw,44px);line-height:1;margin:0;font-weight:950;letter-spacing:.02em;white-space:nowrap;}
.subtitle{justify-self:start;font-size:clamp(14px,1.5vw,20px);font-weight:900;background:#fff9d4;border:3px solid #ffd34e;border-radius:999px;padding:5px 13px;white-space:nowrap;}
.helpMini{border:0;background:#fff4a8;border-radius:18px;width:58px;height:50px;min-height:0;padding:0;font-size:28px;box-shadow:0 5px 0 #0000001b,0 7px 14px #00000012;}
.toolbar{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;}
button{border:0;border-radius:22px;padding:9px 10px;font-weight:950;font-size:clamp(17px,2.1vw,27px);box-shadow:0 6px 0 #0000001d,0 9px 18px #00000012;cursor:pointer;color:#25193a;min-height:86px;line-height:1.08;background:#fff;touch-action:manipulation;}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #0000001d,0 4px 8px #00000014;}
.addBtn{display:grid;grid-template-columns:auto auto;place-content:center;align-items:center;gap:10px;}
.btn1{background:var(--yellow)}.btn10{background:var(--green)}.btn100{background:var(--blue)}.btnExchange{background:var(--purple)}.btnTable{background:var(--pink)}.btnClear{background:var(--red)}
.btnSub{display:block;font-size:clamp(10px,1.05vw,14px);margin-top:5px;font-weight:850;color:#29344b;}
.btnIcon{display:grid;place-items:center;width:52px;height:52px;overflow:hidden;}
.main{min-height:0;padding:10px;display:grid;grid-template-columns:minmax(0,1fr) minmax(255px,30vw);gap:10px;}
#stageWrap{position:relative;border:3px solid var(--line);border-radius:22px;overflow:hidden;background:#fffef7;min-height:0;box-shadow:inset 0 0 0 1px #fff4b5;}
#stage{position:absolute;inset:0;background-image:linear-gradient(#ffffffc9,#ffffffc9),radial-gradient(#f0d98b 1.5px,transparent 1.6px);background-size:100% 100%,28px 28px;touch-action:none;}
.guideCard{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:14px;background:#ffffffe8;border:3px dashed #ffc84a;border-radius:20px;padding:16px 22px;font-size:clamp(16px,1.6vw,23px);font-weight:950;line-height:1.45;z-index:2;pointer-events:none;box-shadow:0 8px 20px #00000010;}
.chick{font-size:50px;line-height:1;}
.side{display:grid;grid-template-rows:minmax(220px,1fr) 110px;gap:10px;min-height:0;}
.panel{background:#ffffffde;border:3px solid var(--line);border-radius:22px;box-shadow:0 8px 20px #00000012;overflow:hidden;min-height:0;}
.placeHead{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;font-size:20px;font-weight:950;background:#fffdf2;border-bottom:2px solid #ffe7a3;}
.switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:900;}
.switch input{width:42px;height:24px;accent-color:#4d8cff;}
.placeTable{height:calc(100% - 46px);display:grid;grid-template-columns:1fr 1fr 1fr;}
.placeCell{position:relative;border-left:2px dashed #94bfff;background:#f7fbff;}
.placeCell:nth-child(2){background:#f3fff7;border-left-color:#8ad7a0}.placeCell:nth-child(3){background:#fff9df;border-left-color:#f0c35a}.placeCell:first-child{border-left:0;}
.placeLabel{position:absolute;left:6px;top:7px;right:6px;text-align:center;border-radius:12px;padding:5px 2px;font-size:clamp(13px,1.4vw,19px);font-weight:950;background:#eaf3ff;border:2px solid #7fb1ff;color:#0040a0;}
.placeCell:nth-child(2) .placeLabel{background:#e8ffef;border-color:#6bc983;color:#126a2d}.placeCell:nth-child(3) .placeLabel{background:#fff2bd;border-color:#f0b735;color:#9a5c00;}
.bottomCards{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.counter,.trash{border-radius:20px;border:3px solid #b8e0ff;background:#fff;display:grid;place-items:center;text-align:center;font-weight:950;box-shadow:0 7px 16px #00000010;}
.counter{font-size:clamp(22px,2.5vw,34px);}
.counter .small{font-size:12px;color:#52606d;margin-top:6px;}
.trash{border-color:#ff9b9b;background:#ffe9e9;font-size:clamp(18px,2vw,26px);color:#8a2d2d;}
.trash.hot{background:#ffb4b4;transform:scale(1.03);}
.rod{position:absolute;user-select:none;cursor:grab;z-index:5;filter:drop-shadow(0 5px 4px #00000024);touch-action:none;}
.rod.dragging{cursor:grabbing;z-index:30;filter:drop-shadow(0 12px 10px #00000038);}
.rod svg{display:block;pointer-events:none;}
.helpModal{position:fixed;inset:0;background:#00000055;display:none;place-items:center;z-index:100;padding:20px;}
.helpModal.on{display:grid;}
.helpBox{background:#fff;border:4px solid var(--line);border-radius:26px;max-width:620px;padding:24px;font-size:24px;font-weight:900;line-height:1.6;box-shadow:0 18px 50px #00000040;}
.helpBox h2{margin:0 0 12px;font-size:34px}.closeHelp{margin-top:18px;width:100%;min-height:62px;background:#fff0a6;}
@media (max-width:1180px){
  header{padding:6px 10px}.topRow{margin-bottom:6px}h1{font-size:34px}.subtitle{font-size:15px;padding:4px 10px}.helpMini{width:50px;height:44px;font-size:24px}
  .toolbar{gap:8px}button{min-height:70px;border-radius:18px;font-size:19px;padding:7px 7px}.btnSub{display:none}.btnIcon{width:42px;height:42px}.main{grid-template-columns:minmax(0,1fr) 300px;padding:8px;gap:8px}.side{grid-template-rows:minmax(210px,1fr) 96px}.placeHead{height:40px;font-size:18px}.placeTable{height:calc(100% - 40px)}.guideCard{font-size:18px;padding:12px 16px}.chick{font-size:42px}
}
@media (max-width:900px){
  html,body{overflow:auto}.app{height:auto;min-height:100dvh;grid-template-rows:auto minmax(680px,1fr)}.topRow{grid-template-columns:1fr auto}.subtitle{display:none}.toolbar{grid-template-columns:repeat(3,minmax(0,1fr))}.main{grid-template-columns:1fr;grid-template-rows:520px 390px}.side{grid-template-rows:270px 100px}.guideCard{font-size:16px}.bottomCards{grid-template-columns:1fr 1fr;}
}
@media (orientation:portrait) and (max-width:900px){.toolbar{grid-template-columns:repeat(2,minmax(0,1fr))}.main{grid-template-rows:580px 410px}.app{grid-template-rows:auto minmax(1000px,1fr)}}
@supports (-webkit-touch-callout:none){.app{height:100svh}@media (max-width:900px){.app{height:auto;min-height:100svh}}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="topRow"><h1>数え棒アプリ</h1><div class="subtitle">100をこえる数を、数え棒であらわそう</div><button class="helpMini" onclick="showHelp()">?</button></div>
  <div class="toolbar">
    <button class="addBtn btn1" onclick="addRod(1)"><span class="btnIcon" id="icon1"></span><span>＋1<span class="btnSub">1の数え棒</span></span></button>
    <button class="addBtn btn10" onclick="addRod(10)"><span class="btnIcon" id="icon10"></span><span>＋10<span class="btnSub">10の数え棒</span></span></button>
    <button class="addBtn btn100" onclick="addRod(100)"><span class="btnIcon" id="icon100"></span><span>＋100<span class="btnSub">100の数え棒</span></span></button>
    <button class="btnExchange" onclick="exchangeRods()">🔄 10こで<br>まとめる</button>
    <button class="btnTable" onclick="toggleTable()">🏠 くらいの<br>へや</button>
    <button class="btnClear" onclick="clearAll()">🗑 ぜんぶ<br>けす</button>
  </div>
</header>
<main class="main">
  <section id="stageWrap"><div id="stage"><div id="guide" class="guideCard"><div class="chick">🐥</div><div>ボタンで数え棒を<span style="color:#f08a00">出して</span>、<br>指やマウスで<span style="color:#f08a00">うごかそう！</span><br>いらない数え棒は、ごみばこへ。</div></div></div></section>
  <aside class="side">
    <section id="tablePanel" class="panel">
      <div class="placeHead">🏠 くらいのへや <label class="switch">表示 <input id="tableSwitch" type="checkbox" checked onchange="setTable(this.checked)"></label></div>
      <div id="table" class="placeTable"><div class="placeCell"><div class="placeLabel">百のくらい</div></div><div class="placeCell"><div class="placeLabel">十のくらい</div></div><div class="placeCell"><div class="placeLabel">一のくらい</div></div></div>
    </section>
    <section class="bottomCards"><div id="counter" class="counter">ぜんぶで：0<div class="small">先生とたしかめよう</div></div><div id="trash" class="trash">🗑<br>ごみばこ<br><span style="font-size:12px;color:#6d4b4b">ここに入れると消えます</span></div></section>
  </aside>
</main>
</div>
<div id="helpModal" class="helpModal" onclick="hideHelp(event)"><div class="helpBox"><h2>🐥 つかいかた</h2><div>① ボタンで数え棒を出します。<br>② 指やマウスで動かします。<br>③ 10こ集まったら「10こでまとめる」。<br>④ いらない数え棒はごみばこへ。</div><button class="closeHelp" onclick="hideHelp(event)">とじる</button></div></div>
<script>
const stage=document.getElementById('stage'), trash=document.getElementById('trash'), counter=document.getElementById('counter'), guide=document.getElementById('guide');
let id=0, spawn=0;
function rodSvg(type, small=false){
 const scale=small?0.42:1;
 if(type===1)return `<svg width="${36*scale}" height="${132*scale}" viewBox="0 0 36 132"><rect x="8" y="6" width="20" height="120" rx="10" fill="#ffd84d" stroke="#b98b00" stroke-width="4"/><text x="18" y="75" text-anchor="middle" font-size="28" font-weight="900" fill="#5d4300">1</text></svg>`;
 if(type===10)return `<svg width="${80*scale}" height="${136*scale}" viewBox="0 0 80 136"><g stroke="#15703a" stroke-width="3"><rect x="8" y="8" width="14" height="120" rx="7" fill="#78d58b"/><rect x="20" y="8" width="14" height="120" rx="7" fill="#86df98"/><rect x="32" y="8" width="14" height="120" rx="7" fill="#78d58b"/><rect x="44" y="8" width="14" height="120" rx="7" fill="#86df98"/><rect x="56" y="8" width="14" height="120" rx="7" fill="#78d58b"/></g><rect x="4" y="55" width="72" height="28" rx="13" fill="#ffffff" stroke="#15703a" stroke-width="4"/><text x="40" y="77" text-anchor="middle" font-size="26" font-weight="900" fill="#126232">10</text></svg>`;
 return `<svg width="${158*scale}" height="${150*scale}" viewBox="0 0 158 150"><g stroke="#2474b8" stroke-width="3"><rect x="18" y="12" width="12" height="124" rx="6" fill="#96d5ff"/><rect x="30" y="12" width="12" height="124" rx="6" fill="#afe0ff"/><rect x="42" y="12" width="12" height="124" rx="6" fill="#96d5ff"/><rect x="54" y="12" width="12" height="124" rx="6" fill="#afe0ff"/><rect x="66" y="12" width="12" height="124" rx="6" fill="#96d5ff"/><rect x="78" y="12" width="12" height="124" rx="6" fill="#afe0ff"/><rect x="90" y="12" width="12" height="124" rx="6" fill="#96d5ff"/><rect x="102" y="12" width="12" height="124" rx="6" fill="#afe0ff"/><rect x="114" y="12" width="12" height="124" rx="6" fill="#96d5ff"/><rect x="126" y="12" width="12" height="124" rx="6" fill="#afe0ff"/></g><rect x="10" y="34" width="138" height="22" rx="11" fill="#fff" stroke="#2474b8" stroke-width="5"/><rect x="10" y="94" width="138" height="22" rx="11" fill="#fff" stroke="#2474b8" stroke-width="5"/><rect x="37" y="58" width="84" height="38" rx="18" fill="#fff" stroke="#2474b8" stroke-width="5"/><text x="79" y="86" text-anchor="middle" font-size="32" font-weight="900" fill="#155a93">100</text></svg>`;
}
document.getElementById('icon1').innerHTML=rodSvg(1,true);document.getElementById('icon10').innerHTML=rodSvg(10,true);document.getElementById('icon100').innerHTML=rodSvg(100,true);
function addRod(type,x=null,y=null){
 guide.style.display='none';
 const el=document.createElement('div'); el.className='rod'; el.dataset.type=type; el.dataset.id=++id; el.innerHTML=rodSvg(type,false);
 const sr=stage.getBoundingClientRect();
 if(x===null){const col=spawn%7,row=Math.floor(spawn/7); x=30+col*58; y=30+row*44; spawn++; if(type===10)x+=70; if(type===100)x+=130; x=Math.min(x, Math.max(0,sr.width-180)); y=Math.min(y, Math.max(0,sr.height-160));}
 el.style.left=x+'px'; el.style.top=y+'px'; stage.appendChild(el); makeDrag(el); updateCounter(); return el;
}
function makeDrag(el){let ox=0,oy=0,down=false;el.addEventListener('pointerdown',e=>{down=true;el.setPointerCapture(e.pointerId);el.classList.add('dragging');const r=el.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;});el.addEventListener('pointermove',e=>{if(!down)return;const sr=stage.getBoundingClientRect();el.style.left=Math.max(0,Math.min(sr.width-30,e.clientX-sr.left-ox))+'px';el.style.top=Math.max(0,Math.min(sr.height-30,e.clientY-sr.top-oy))+'px';trash.classList.toggle('hot',hit(el,trash));});el.addEventListener('pointerup',()=>{down=false;el.classList.remove('dragging');if(hit(el,trash))el.remove();trash.classList.remove('hot');updateCounter();});}
function hit(a,b){const r=a.getBoundingClientRect(),t=b.getBoundingClientRect();return !(r.right<t.left||r.left>t.right||r.bottom<t.top||r.top>t.bottom)}
function updateCounter(){const rods=[...document.querySelectorAll('.rod')];const n=rods.reduce((s,e)=>s+Number(e.dataset.type),0);counter.innerHTML=`ぜんぶで：${n}<div class="small">1=${rods.filter(e=>e.dataset.type==='1').length}本　10=${rods.filter(e=>e.dataset.type==='10').length}こ　100=${rods.filter(e=>e.dataset.type==='100').length}こ</div>`;if(rods.length===0)guide.style.display='flex';}
function setTable(on){document.getElementById('tablePanel').style.display=on?'block':'none';}
function toggleTable(){const sw=document.getElementById('tableSwitch');sw.checked=!sw.checked;setTable(sw.checked);}
function clearAll(){if(confirm('数え棒をぜんぶけしますか？')){document.querySelectorAll('.rod').forEach(e=>e.remove());spawn=0;updateCounter();}}
function exchangeRods(){const ones=[...document.querySelectorAll('.rod[data-type="1"]')];let tens=[...document.querySelectorAll('.rod[data-type="10"]')];let made=0;while(ones.length>=10){const group=ones.splice(0,10),x=avg(group,'left'),y=avg(group,'top');group.forEach(e=>e.remove());addRod(10,x,y);made++;}tens=[...document.querySelectorAll('.rod[data-type="10"]')];while(tens.length>=10){const group=tens.splice(0,10),x=avg(group,'left'),y=avg(group,'top');group.forEach(e=>e.remove());addRod(100,x,y);made++;}if(!made)alert('まだ、まとめられる数え棒がありません。\n1が10本、または10が10こでまとめられます。');updateCounter();}
function avg(group,prop){return group.reduce((s,e)=>s+parseFloat(e.style[prop]||0),0)/group.length;}
function showHelp(){document.getElementById('helpModal').classList.add('on')}function hideHelp(e){e.stopPropagation();document.getElementById('helpModal').classList.remove('on')}
</script>
</body>
</html>
