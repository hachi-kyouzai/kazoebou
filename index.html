<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>数え棒ボード</title>
<style>
  :root{
    --bg:#fff8df;
    --panel:#ffffff;
    --line:#f2bd23;
    --green:#2fad4a;
    --green2:#e9f9e9;
    --yellow:#f2a900;
    --yellow2:#fff4cc;
    --blue:#2f83d8;
    --blue2:#e6f2ff;
    --pink:#ff6b92;
    --text:#1f2937;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; touch-action:none;}
  .app{height:100vh; display:flex; flex-direction:column; gap:10px; padding:12px;}
  .top{display:grid; grid-template-columns: 1fr 1fr 1fr 0.65fr 0.65fr 0.75fr; gap:10px; min-height:118px;}
  button{border:4px solid #ddd; border-radius:22px; background:#fff; font-weight:900; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; gap:10px; min-width:0;}
  button:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .add1{border-color:var(--green); background:var(--green2);}
  .add10{border-color:var(--yellow); background:var(--yellow2);}
  .add100{border-color:var(--blue); background:var(--blue2);}
  .reset{border-color:#f7a4b9; background:#ffe8ef; color:#b51544;}
  .trashBtn{border-color:#d6c7b8; background:#fffaf2; color:#5b4636;}
  .placeBtn{border-color:#9bd3ff; background:#eef8ff; color:#1766a8;}
  .btnNum{font-size:58px; line-height:1;}
  .btnSub{font-size:19px; white-space:nowrap;}
  .miniRod{width:48px;height:86px;flex:0 0 auto; transform:scale(.86); transform-origin:center;}
  .toolbarSmall{font-size:24px; flex-direction:column; gap:2px;}
  .workspace{position:relative; flex:1; background:#fff; border:6px solid var(--line); border-radius:28px; overflow:hidden; min-height:0; box-shadow: inset 0 0 0 2px rgba(255,255,255,.8);}
  .title{position:absolute; top:18px; left:24px; font-size:31px; font-weight:900; letter-spacing:.05em; display:flex; align-items:center; gap:10px; z-index:5; pointer-events:none;}
  .subtitle{position:absolute; top:64px; left:82px; font-size:18px; font-weight:800; color:#5c6470; z-index:5; pointer-events:none;}
  .star{font-size:42px; color:#ffcd19; text-shadow:0 2px 0 #d99b00;}
  .counter{position:absolute; top:18px; right:20px; min-width:260px; padding:12px 16px; background:#ffffffdd; border:3px solid #dbeafe; border-radius:18px; font-size:22px; font-weight:900; z-index:5; display:flex; gap:16px; justify-content:center; backdrop-filter: blur(4px);}
  .counter span:nth-child(1){color:var(--blue)} .counter span:nth-child(2){color:var(--yellow)} .counter span:nth-child(3){color:var(--green)}
  .placeTable{position:absolute; inset:98px 22px 24px 22px; display:none; grid-template-columns:1fr 1fr 1fr; gap:12px; pointer-events:none; z-index:1;}
  .placeTable.show{display:grid;}
  .col{border:4px dashed #c7d2fe; border-radius:22px; background:rgba(239,246,255,.48); display:flex; flex-direction:column; align-items:center;}
  .colHead{margin-top:12px; padding:6px 18px; border-radius:999px; background:#fff; border:3px solid #93c5fd; font-size:25px; font-weight:900;}
  .rod{position:absolute; z-index:10; user-select:none; touch-action:none; cursor:grab; filter: drop-shadow(0 8px 5px rgba(0,0,0,.18));}
  .rod.dragging{z-index:999; cursor:grabbing; filter: drop-shadow(0 13px 9px rgba(0,0,0,.25));}
  .rod svg{display:block; width:100%; height:100%;}
  .rod.one{width:48px;height:126px;}
  .rod.ten{width:72px;height:146px;}
  .rod.hundred{width:92px;height:162px;}
  .bottom{display:grid; grid-template-columns: 160px 1fr 230px; gap:12px; min-height:112px;}
  .helpTitle{border:4px solid #ff9cc1; border-radius:20px; background:#ffe6f0; font-size:28px; font-weight:900; display:flex; align-items:center; justify-content:center;}
  .help{background:#fffdf6; border:3px dashed #ffcf76; border-radius:20px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:10px; font-size:17px; font-weight:800; align-items:center;}
  .step{display:flex; align-items:center; gap:10px; border-right:3px dotted #f0b35a; min-height:80px; padding:2px 10px;}
  .step:last-child{border-right:none;}
  .badge{width:34px;height:34px;border-radius:50%;background:#18a558;color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex:0 0 auto;}
  .chick{position:relative; background:#fffef6; border:4px solid #ffcf4a; border-radius:28px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; text-align:center; padding:12px;}
  .chickFace{position:absolute; right:12px; bottom:4px; font-size:42px;}
  .toast{position:absolute; left:50%; bottom:145px; transform:translateX(-50%); background:#172554; color:white; padding:12px 22px; border-radius:999px; font-size:22px; font-weight:900; z-index:2000; opacity:0; pointer-events:none; transition:.25s;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-10px);}
  @media (max-width:900px){
    .app{padding:8px; gap:8px;}
    .top{grid-template-columns:1fr 1fr 1fr; min-height:210px;}
    .toolbarSmall{font-size:22px; min-height:88px;}
    .btnNum{font-size:48px}.btnSub{font-size:16px}.miniRod{width:38px;height:72px;}
    .bottom{grid-template-columns:1fr; min-height:150px;}
    .helpTitle{display:none}.chick{display:none}.help{font-size:14px;}
    .counter{top:auto; bottom:14px; right:14px; min-width:210px; font-size:18px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <button class="add1" onclick="addRod('one')" aria-label="1をふやす"><div class="miniRod" id="icon1"></div><div><div class="btnNum">＋1</div><div class="btnSub">1の数え棒をふやす</div></div></button>
    <button class="add10" onclick="addRod('ten')" aria-label="10をふやす"><div class="miniRod" id="icon10"></div><div><div class="btnNum">＋10</div><div class="btnSub">10の数え棒をふやす</div></div></button>
    <button class="add100" onclick="addRod('hundred')" aria-label="100をふやす"><div class="miniRod" id="icon100"></div><div><div class="btnNum">＋100</div><div class="btnSub">100の数え棒をふやす</div></div></button>
    <button class="toolbarSmall reset" onclick="resetBoard()"><div style="font-size:42px">↻</div><div>はじめから</div></button>
    <button class="toolbarSmall trashBtn" onclick="deleteSelected()"><div style="font-size:42px">🗑️</div><div>えらんで<br>けす</div></button>
    <button class="toolbarSmall placeBtn" onclick="togglePlace()"><div style="font-size:40px">表</div><div>くらいの<br>表</div></button>
  </div>

  <div class="workspace" id="board">
    <div class="title"><span class="star">★</span>数え棒をならべて 数をあらわそう！</div>
    <div class="subtitle">うごかしたい数え棒を、ゆびでひっぱろう</div>
    <div class="counter"><span>100: <b id="c100">0</b></span><span>10: <b id="c10">0</b></span><span>1: <b id="c1">0</b></span></div>
    <div class="placeTable" id="placeTable"><div class="col"><div class="colHead">100のくらい</div></div><div class="col"><div class="colHead">10のくらい</div></div><div class="col"><div class="colHead">1のくらい</div></div></div>
    <div class="toast" id="toast">できました</div>
  </div>

  <div class="bottom">
    <div class="helpTitle">つかい方</div>
    <div class="help">
      <div class="step"><div class="badge">1</div><div>上のボタンをおして、数え棒をふやそう。</div></div>
      <div class="step"><div class="badge">2</div><div>数え棒をゆびでうごかして、ならべよう。</div></div>
      <div class="step"><div class="badge">3</div><div>いらないときは、えらんで「けす」。</div></div>
    </div>
    <div class="chick"><div>いくつに<br>なったかな？</div><div class="chickFace">🐥</div></div>
  </div>
</div>
<script>
const board=document.getElementById('board');
const toast=document.getElementById('toast');
let selected=null, seq=0;
function svgOne(label='1', color='#83d35e', stroke='#226b22'){
 return `<svg viewBox="0 0 50 130" xmlns="http://www.w3.org/2000/svg"><g><rect x="18" y="7" width="14" height="112" rx="6" fill="${color}" stroke="${stroke}" stroke-width="2"/><ellipse cx="25" cy="8" rx="7" ry="5" fill="#b7f08d" stroke="${stroke}" stroke-width="2"/><rect x="8" y="58" width="34" height="34" rx="5" fill="#fff" stroke="#64523c" stroke-width="2"/><text x="25" y="84" text-anchor="middle" font-size="26" font-weight="900" font-family="Arial">${label}</text></g></svg>`;
}
function svgBundle(label,color,stroke,n=6){
 let rods=''; for(let i=0;i<n;i++){let x=10+i*8; rods+=`<rect x="${x}" y="10" width="12" height="116" rx="5" fill="${color}" stroke="${stroke}" stroke-width="2"/><ellipse cx="${x+6}" cy="10" rx="6" ry="4" fill="rgba(255,255,255,.35)" stroke="${stroke}" stroke-width="1.5"/>`;}
 return `<svg viewBox="0 0 74 150" xmlns="http://www.w3.org/2000/svg"><g>${rods}<rect x="6" y="62" width="62" height="16" rx="4" fill="#f8f2dc" stroke="#75654a" stroke-width="2"/><rect x="16" y="84" width="42" height="42" rx="5" fill="#fff" stroke="#64523c" stroke-width="2"/><text x="37" y="115" text-anchor="middle" font-size="29" font-weight="900" font-family="Arial">${label}</text></g></svg>`;
}
function svgHundred(){
 let rods=''; for(let i=0;i<8;i++){let x=9+i*9; rods+=`<rect x="${x}" y="10" width="13" height="130" rx="5" fill="#62b9f0" stroke="#155899" stroke-width="2"/><ellipse cx="${x+6.5}" cy="10" rx="6.5" ry="4" fill="#aee3ff" stroke="#155899" stroke-width="1.5"/>`;}
 return `<svg viewBox="0 0 92 166" xmlns="http://www.w3.org/2000/svg"><g>${rods}<rect x="8" y="72" width="76" height="18" rx="4" fill="#f8f2dc" stroke="#75654a" stroke-width="2"/><rect x="18" y="98" width="56" height="48" rx="6" fill="#fff" stroke="#64523c" stroke-width="2"/><text x="46" y="132" text-anchor="middle" font-size="31" font-weight="900" font-family="Arial">100</text></g></svg>`;
}
function drawIcons(){document.getElementById('icon1').innerHTML=svgOne(); document.getElementById('icon10').innerHTML=svgBundle('10','#ffd22f','#9c6b00',6); document.getElementById('icon100').innerHTML=svgHundred();}
function addRod(type){
 const el=document.createElement('div'); el.className='rod '+type; el.dataset.type=type; el.dataset.id=++seq;
 el.innerHTML= type==='one'?svgOne(): type==='ten'?svgBundle('10','#ffd22f','#9c6b00',6):svgHundred();
 const startY = 150 + (seq%5)*12; let startX;
 if(type==='hundred') startX=60+(countType('hundred')%6)*105; else if(type==='ten') startX=390+(countType('ten')%8)*82; else startX=740+(countType('one')%12)*52;
 el.style.left=startX+'px'; el.style.top=startY+'px';
 el.addEventListener('pointerdown', pointerDown);
 el.addEventListener('click', ()=>selectRod(el));
 board.appendChild(el); selectRod(el); updateCount();
}
function countType(t){return [...board.querySelectorAll('.rod')].filter(e=>e.dataset.type===t).length;}
function updateCount(){document.getElementById('c1').textContent=countType('one'); document.getElementById('c10').textContent=countType('ten'); document.getElementById('c100').textContent=countType('hundred');}
function selectRod(el){ if(selected) selected.style.outline=''; selected=el; if(el){el.style.outline='5px solid #ff5f8f'; el.style.borderRadius='10px';}}
function pointerDown(e){ const el=e.currentTarget; selectRod(el); el.classList.add('dragging'); el.setPointerCapture(e.pointerId); const r=el.getBoundingClientRect(); const br=board.getBoundingClientRect(); const dx=e.clientX-r.left, dy=e.clientY-r.top;
 const move=(ev)=>{ let x=ev.clientX-br.left-dx; let y=ev.clientY-br.top-dy; x=Math.max(0,Math.min(board.clientWidth-el.offsetWidth,x)); y=Math.max(90,Math.min(board.clientHeight-el.offsetHeight,y)); el.style.left=x+'px'; el.style.top=y+'px';};
 const up=()=>{el.classList.remove('dragging'); el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); el.removeEventListener('pointercancel',up);};
 el.addEventListener('pointermove',move); el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
}
function deleteSelected(){ if(selected){selected.remove(); selected=null; updateCount(); showToast('けしました');}}
function resetBoard(){ board.querySelectorAll('.rod').forEach(e=>e.remove()); selected=null; updateCount(); showToast('はじめから');}
function togglePlace(){document.getElementById('placeTable').classList.toggle('show');}
function showToast(msg){toast.textContent=msg; toast.classList.add('show'); clearTimeout(window.__toast); window.__toast=setTimeout(()=>toast.classList.remove('show'),1100);}
drawIcons();
</script>
</body>
</html>
