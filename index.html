<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>数え棒アプリ</title>
<style>
  :root{--bg:#fff7d7;--panel:#ffffff;--ink:#273043;--line:#e6d49a;--blue:#5eb6ff;--green:#62c77a;--yellow:#ffd34e;--red:#ff7777;--purple:#9b8cff;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(180deg,#fff9df,#f3fbff);color:var(--ink);overflow:auto;}
  .app{min-height:100dvh;display:grid;grid-template-rows:auto minmax(620px,1fr);}
  header{padding:10px 14px 8px;background:#fff;border-bottom:4px solid #ffe28a;box-shadow:0 3px 12px #00000012;}
  .titleRow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  h1{font-size:clamp(24px,3.2vw,38px);margin:0;font-weight:900;letter-spacing:.02em;}
  .subtitle{font-size:16px;font-weight:800;background:#fff1aa;border:2px solid #f3cf58;border-radius:999px;padding:6px 12px;}
  .toolbar{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;align-items:stretch;margin-top:10px;}
  button{border:0;border-radius:22px;padding:10px 12px;font-weight:900;font-size:clamp(16px,1.9vw,25px);box-shadow:0 6px 0 #0000001d,0 9px 18px #00000014;cursor:pointer;color:#213;min-height:clamp(64px,8vh,104px);background:#fff;line-height:1.15;touch-action:manipulation;}
  button:active{transform:translateY(3px);box-shadow:0 2px 0 #0000001d,0 4px 8px #00000014;}
  .addBtn{display:flex;align-items:center;gap:8px;min-width:0;justify-content:center;}
  .btn1{background:#fff2a9}.btn10{background:#dff7e6}.btn100{background:#e4f2ff}.btnExchange{background:#eeeaff}.btnTable{background:#ffe9f2}.btnClear{background:#ffdede}
  .btnIcon{display:grid;place-items:center;width:clamp(42px,5.2vw,70px);height:clamp(42px,5.2vw,70px);overflow:hidden;flex:0 0 auto;}
  .main{position:relative;overflow:hidden;min-height:620px;}
  #stage{position:absolute;inset:0;background-image:linear-gradient(#ffffffc9,#ffffffc9),radial-gradient(#f0d98b 1.5px,transparent 1.6px);background-size:100% 100%,28px 28px;}
  .help{position:absolute;top:12px;left:12px;background:#ffffffeb;border:3px solid #ffe08a;border-radius:20px;padding:10px 14px;box-shadow:0 8px 18px #00000014;max-width:min(690px,calc(100vw - 24px));font-size:clamp(14px,1.55vw,19px);font-weight:800;line-height:1.45;z-index:3;}
  .help b{font-size:20px}.mascot{display:inline-block;background:#ffe169;border:2px solid #e5bd39;border-radius:50%;width:32px;height:32px;text-align:center;line-height:29px;margin-right:6px;}
  .placeTable{position:absolute;right:14px;top:14px;width:min(540px,48vw);height:min(66%,calc(100% - 145px));display:none;grid-template-columns:1fr 1fr 1fr;border:4px solid #8ab1ff;border-radius:22px;overflow:hidden;background:#ffffffd8;box-shadow:0 8px 20px #00000018;z-index:1;}
  .placeTable.on{display:grid;}
  .placeCell{border-left:3px dashed #aac6ff;position:relative;}
  .placeCell:first-child{border-left:0;}
  .placeLabel{position:absolute;left:8px;top:8px;background:#eef5ff;border:2px solid #93b6ff;border-radius:999px;padding:7px 11px;font-size:clamp(16px,2vw,24px);font-weight:900;}
  .trash{position:absolute;right:14px;bottom:14px;width:clamp(88px,11vw,128px);height:clamp(74px,10vh,110px);border-radius:22px;background:#ffe1e1;border:4px solid #ff9b9b;display:grid;place-items:center;font-size:clamp(18px,2vw,25px);font-weight:900;box-shadow:0 8px 20px #00000018;z-index:4;}
  .trash.hot{background:#ffaaaa;transform:scale(1.04);}
  .rod{position:absolute;user-select:none;cursor:grab;z-index:5;filter:drop-shadow(0 5px 4px #00000024);touch-action:none;}
  .rod.dragging{cursor:grabbing;z-index:20;filter:drop-shadow(0 12px 10px #00000038);}
  .rod svg{display:block;pointer-events:none;}
  .counter{position:absolute;left:14px;bottom:14px;background:#fff;border:3px solid #b8e0ff;border-radius:18px;padding:9px 13px;font-size:clamp(16px,1.8vw,20px);font-weight:900;box-shadow:0 7px 16px #00000014;z-index:4;max-width:calc(100vw - 130px);} 
  .small{font-size:14px;font-weight:800;color:#52606d;margin-left:8px;}
  @media (max-width:1180px){
  header{padding:8px 10px 7px;}
  .titleRow{gap:8px;}
  h1{font-size:clamp(22px,3vw,32px);}
  .subtitle{font-size:14px;padding:5px 10px;}
  .toolbar{grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-top:8px;}
  button{border-radius:18px;min-height:64px;padding:8px 8px;font-size:17px;}
  .btnIcon{width:42px;height:42px;}
  .help{font-size:14px;line-height:1.35;padding:8px 10px;max-width:calc(100vw - 220px);}
  .help b{font-size:16px;}
  .mascot{width:26px;height:26px;line-height:23px;}
  .placeTable{width:min(520px,52vw);height:min(62%,calc(100% - 125px));}
  .counter{font-size:16px;}
  .small{font-size:12px;}
}
@media (max-width:900px){
  .app{height:auto;min-height:100dvh;grid-template-rows:auto minmax(560px,1fr);}
  body{overflow:auto;}
  .toolbar{grid-template-columns:repeat(3,minmax(0,1fr));}
  .subtitle{display:none;}
  button{font-size:17px;min-height:60px;}
  .help{max-width:calc(100vw - 24px);font-size:13px;}
  .placeTable{width:calc(100vw - 28px);height:44%;top:120px;right:14px;}
  .trash{width:92px;height:78px;}
  .counter{font-size:15px;max-width:calc(100vw - 118px);}
}
@media (orientation:portrait) and (max-width:900px){
  .app{grid-template-rows:auto minmax(620px,1fr);}
  .toolbar{grid-template-columns:repeat(2,minmax(0,1fr));}
  button{min-height:58px;}
  .placeTable{top:150px;height:38%;}
}
@supports (-webkit-touch-callout:none){
  .app{height:100svh;}
}

/* iPadで下が見切れないための最終調整 */
@media (min-width:901px) and (max-width:1180px){
  .app{height:auto;min-height:100dvh;grid-template-rows:auto minmax(600px,1fr);}
  .main{min-height:600px;}
  header{padding:6px 10px 6px;}
  .toolbar{gap:7px;margin-top:7px;}
  button{min-height:58px;font-size:16px;padding:7px 7px;}
  .btnIcon{width:38px;height:38px;}
  .help{top:10px;left:10px;font-size:13px;line-height:1.28;padding:7px 9px;max-width:calc(100vw - 220px);}
  .placeTable{height:min(58%,calc(100% - 115px));}
  .counter{bottom:10px;}
  .trash{bottom:10px;}
}
@media (orientation:portrait) and (min-width:901px) and (max-width:1180px){
  .toolbar{grid-template-columns:repeat(3,minmax(0,1fr));}
  .app{grid-template-rows:auto minmax(680px,1fr);}
  .main{min-height:680px;}
  .help{max-width:calc(100vw - 24px);}
  .placeTable{width:calc(100vw - 28px);height:40%;top:128px;}
}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="titleRow"><h1>数え棒アプリ</h1><div class="subtitle">100をこえる数を、数え棒であらわそう</div></div>
    <div class="toolbar">
      <button class="addBtn btn1" onclick="addRod(1)"><span class="btnIcon" id="icon1"></span><span>＋1</span></button>
      <button class="addBtn btn10" onclick="addRod(10)"><span class="btnIcon" id="icon10"></span><span>＋10</span></button>
      <button class="addBtn btn100" onclick="addRod(100)"><span class="btnIcon" id="icon100"></span><span>＋100</span></button>
      <button class="btnExchange" onclick="exchangeRods()">🔄 10こで<br>まとめる</button>
      <button class="btnTable" onclick="toggleTable()">くらいの<br>へや</button>
      <button class="btnClear" onclick="clearAll()">ぜんぶ<br>けす</button>
    </div>
  </header>
  <main class="main">
    <div id="stage">
      <div class="help"><span class="mascot">🐥</span><b>つかいかた</b><br>① ボタンで数え棒を出します。　② 指やマウスでうごかします。　③ いらない数え棒は右下のごみばこへ。</div>
      <div id="table" class="placeTable">
        <div class="placeCell"><div class="placeLabel">百のへや</div></div>
        <div class="placeCell"><div class="placeLabel">十のへや</div></div>
        <div class="placeCell"><div class="placeLabel">一のへや</div></div>
      </div>
      <div id="trash" class="trash">🗑<br>けす</div>
      <div id="counter" class="counter">ぜんぶで：0 <span class="small">先生とたしかめよう</span></div>
    </div>
  </main>
</div>
<script>
const stage=document.getElementById('stage'), trash=document.getElementById('trash'), counter=document.getElementById('counter');
let id=0, spawn=0;
function rodSvg(type, small=false){
  const scale=small?0.42:1;
  if(type===1)return `<svg width="${36*scale}" height="${132*scale}" viewBox="0 0 36 132"><rect x="8" y="6" width="20" height="120" rx="10" fill="#ffd84d" stroke="#b98b00" stroke-width="4"/><text x="18" y="75" text-anchor="middle" font-size="28" font-weight="900" fill="#5d4300">1</text></svg>`;
  if(type===10)return `<svg width="${80*scale}" height="${136*scale}" viewBox="0 0 80 136"><g stroke="#15703a" stroke-width="3"><rect x="8" y="8" width="14" height="120" rx="7" fill="#78d58b"/><rect x="20" y="8" width="14" height="120" rx="7" fill="#86df98"/><rect x="32" y="8" width="14" height="120" rx="7" fill="#78d58b"/><rect x="44" y="8" width="14" height="120" rx="7" fill="#86df98"/><rect x="56" y="8" width="14" height="120" rx="7" fill="#78d58b"/></g><rect x="4" y="55" width="72" height="28" rx="13" fill="#ffffff" stroke="#15703a" stroke-width="4"/><text x="40" y="77" text-anchor="middle" font-size="26" font-weight="900" fill="#126232">10</text></svg>`;
  return `<svg width="${158*scale}" height="${150*scale}" viewBox="0 0 158 150">
    <g stroke="#2474b8" stroke-width="3">
      <rect x="18" y="12" width="12" height="124" rx="6" fill="#96d5ff"/>
      <rect x="30" y="12" width="12" height="124" rx="6" fill="#afe0ff"/>
      <rect x="42" y="12" width="12" height="124" rx="6" fill="#96d5ff"/>
      <rect x="54" y="12" width="12" height="124" rx="6" fill="#afe0ff"/>
      <rect x="66" y="12" width="12" height="124" rx="6" fill="#96d5ff"/>
      <rect x="78" y="12" width="12" height="124" rx="6" fill="#afe0ff"/>
      <rect x="90" y="12" width="12" height="124" rx="6" fill="#96d5ff"/>
      <rect x="102" y="12" width="12" height="124" rx="6" fill="#afe0ff"/>
      <rect x="114" y="12" width="12" height="124" rx="6" fill="#96d5ff"/>
      <rect x="126" y="12" width="12" height="124" rx="6" fill="#afe0ff"/>
    </g>
    <rect x="10" y="34" width="138" height="22" rx="11" fill="#fff" stroke="#2474b8" stroke-width="5"/>
    <rect x="10" y="94" width="138" height="22" rx="11" fill="#fff" stroke="#2474b8" stroke-width="5"/>
    <rect x="37" y="58" width="84" height="38" rx="18" fill="#fff" stroke="#2474b8" stroke-width="5"/>
    <text x="79" y="86" text-anchor="middle" font-size="32" font-weight="900" fill="#155a93">100</text>
  </svg>`;
}
document.getElementById('icon1').innerHTML=rodSvg(1,true);document.getElementById('icon10').innerHTML=rodSvg(10,true);document.getElementById('icon100').innerHTML=rodSvg(100,true);
function addRod(type,x=null,y=null){
  const el=document.createElement('div'); el.className='rod'; el.dataset.type=type; el.dataset.id=++id; el.innerHTML=rodSvg(type,false);
  const rect=stage.getBoundingClientRect();
  if(x===null){x=28+(spawn%8)*45; y=165+Math.floor(spawn/8)*34; spawn++; if(type===10)x+=80; if(type===100)x+=170;}
  el.style.left=x+'px'; el.style.top=y+'px'; stage.appendChild(el); makeDrag(el); updateCounter(); return el;
}
function makeDrag(el){
  let ox=0, oy=0, down=false;
  el.addEventListener('pointerdown',e=>{down=true; el.setPointerCapture(e.pointerId); el.classList.add('dragging'); const r=el.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;});
  el.addEventListener('pointermove',e=>{if(!down)return; const sr=stage.getBoundingClientRect(); el.style.left=Math.max(0,Math.min(sr.width-30,e.clientX-sr.left-ox))+'px'; el.style.top=Math.max(0,Math.min(sr.height-30,e.clientY-sr.top-oy))+'px'; trash.classList.toggle('hot',hit(el,trash));});
  el.addEventListener('pointerup',e=>{down=false; el.classList.remove('dragging'); if(hit(el,trash))el.remove(); trash.classList.remove('hot'); updateCounter();});
}
function hit(a,b){const r=a.getBoundingClientRect(), t=b.getBoundingClientRect();return !(r.right<t.left||r.left>t.right||r.bottom<t.top||r.top>t.bottom)}
function updateCounter(){const rods=[...document.querySelectorAll('.rod')]; const n=rods.reduce((s,e)=>s+Number(e.dataset.type),0); counter.innerHTML=`ぜんぶで：${n} <span class="small">1=${rods.filter(e=>e.dataset.type==='1').length}本　10=${rods.filter(e=>e.dataset.type==='10').length}こ　100=${rods.filter(e=>e.dataset.type==='100').length}こ</span>`;}
function toggleTable(){document.getElementById('table').classList.toggle('on');}
function clearAll(){if(confirm('数え棒をぜんぶけしますか？')){document.querySelectorAll('.rod').forEach(e=>e.remove()); spawn=0; updateCounter();}}
function exchangeRods(){
  const ones=[...document.querySelectorAll('.rod[data-type="1"]')]; const tens=[...document.querySelectorAll('.rod[data-type="10"]')]; let made=0;
  while(ones.length>=10){const group=ones.splice(0,10); let x=avg(group,'left'), y=avg(group,'top'); group.forEach(e=>e.remove()); addRod(10,x,y); made++;}
  let tensNow=[...document.querySelectorAll('.rod[data-type="10"]')];
  while(tensNow.length>=10){const group=tensNow.splice(0,10); let x=avg(group,'left'), y=avg(group,'top'); group.forEach(e=>e.remove()); addRod(100,x,y); made++;}
  if(!made) alert('まだ、まとめられる数え棒がありません。\n1が10本、または10が10こでまとめられます。'); updateCounter();
}
function avg(group,prop){return group.reduce((s,e)=>s+parseFloat(e.style[prop]||0),0)/group.length;}
</script>
</body>
</html>
